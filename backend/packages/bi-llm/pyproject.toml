[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bi-llm"
version = "0.1.0"
description = "Multi-provider LLM routing for the BI agents: a JsonTaskRouter that sends per-task prompts (from YAML) to OpenAI or Gemini (via its OpenAI-compatible endpoint) and returns schema-validated JSON. Ships a deterministic offline completer so the platform boots and tests without API keys."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary" }
authors = [{ name = "ABC Corporation" }]
dependencies = [
    "bi-base",
    "pyyaml>=6",
]

[project.optional-dependencies]
openai = ["openai>=1.30"]
dev = ["pytest>=8.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["bi_llm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
ignore = ["E501"]
