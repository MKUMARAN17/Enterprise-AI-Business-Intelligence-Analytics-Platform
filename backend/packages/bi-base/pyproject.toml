[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bi-base"
version = "0.1.0"
description = "Foundation layer for the Enterprise BI platform: structured logging (structlog), the request-context correlation id, the base error hierarchy + problem-details shape, and JSON-schema structured-output helpers shared by every other package."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary" }
authors = [{ name = "ABC Corporation" }]
dependencies = [
    "structlog>=24.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["bi_base"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
ignore = ["E501"]
