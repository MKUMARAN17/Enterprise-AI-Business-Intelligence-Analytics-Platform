[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bi-auth"
version = "0.1.0"
description = "Authentication + RBAC for the Enterprise BI platform: fail-closed JWT validation (HS256 dev / RS256 prod) yielding a typed Identity, and the role→allowed-tables policy that scopes every generated SQL query. No FastAPI dependency — the app wires the dependency."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary" }
authors = [{ name = "ABC Corporation" }]
dependencies = [
    "bi-base",
    "pyjwt[crypto]>=2.8",
]

[project.optional-dependencies]
dev = ["pytest>=8.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["bi_auth"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
ignore = ["E501"]
